{% extends "base.html" %}

{% block content %}
<form method="POST">
  {% csrf_token %}
  <div class="form-group">
    <input type="text" name="new-statistic" class="form-control" placeholder="Add statistic">
    <button type="submit" class="btn btn-primary mt-3">Add</button>
  </div>
</form>

  {% if qs %}
  <ul>
    {% for el in qs %}
      <li><a href="{{ el.get_absolute_url }}">{{ el.name }}</a></li>
    {% endfor %}
  </ul>
  {% endif %}
{% endblock content %}
