{% extends "base.html" %}

{% block content %}
<h3>Add New Device</h3>
<form method="POST" class="mb-4">
  {% csrf_token %}
  <div class="form-group">
    <input type="text" name="new-device" class="form-control" placeholder="Enter Device Name (e.g. Web Server 1)">
    <button type="submit" class="btn btn-success">Add to Monitor</button>
  </div>
</form>

<h3>Monitored Devices</h3>
{% if qs %}
<div class="list-group">
  {% for el in qs %}
    <a href="{{ el.get_absolute_url }}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
      {{ el.name }}
      <span class="badge bg-primary rounded-pill">View Details</span>
    </a>
  {% endfor %}
</div>
{% else %}
  <p class="text-muted">No devices added yet.</p>
{% endif %}
{% endblock content %}
