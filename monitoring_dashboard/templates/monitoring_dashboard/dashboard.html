{% extends "base.html" %}
{% load static %}

{% block scripts %}
  <!-- Chart.js for visualization -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Pass Django variables to JS -->
  <script>
    const dashboardSlug = "{{ slug }}";
  </script>
  <script src="{% static 'stats/dashboard.js' %}" defer></script>
{% endblock scripts %}

{% block content %}
<nav aria-label="breadcrumb">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="/">Home</a></li>
    <li class="breadcrumb-item active">{{ name }}</li>
  </ol>
</nav>

<div class="row">
  <div class="col-md-4">
    <div class="card p-3">
        <h3 id="dashboard-name">{{ name }}</h3>
        <p class="text-muted">ID: <span id="dashboard-slug">{{ slug }}</span></p>
        <hr>
        <div class="form-group">
          <label class="form-label">Manual Health Input</label>
          <input id="data-input" type="number" class="form-control" placeholder="Enter latency (ms)">
          <button id="submit-btn" class="btn btn-primary mt-2 w-100">Send Update</button>
        </div>
    </div>
  </div>

<div class="col-md-8">
    <div class="card p-3">
        <h5>Latency Over Time (ms)</h5>
        <canvas id="dashboard-chart"></canvas>
    </div>
  </div>
</div>
{% endblock content %}
